version: 1

project:
  name: com.github.knarfs.smuview
  #version_command: git describe --tags

build:
  cmake:
    extra_variables:
      - DISABLE_WERROR=y
      - ENABLE_TESTS=n
      - CMAKE_EXPORT_COMPILE_COMMANDS=y
      - PYBIND11_FINDPYTHON=ON
      # Force pybind11 2.9.2 as the AppImage Conda environment uses Python 3.7
      - FORCE_PYBIND11_29=ON
    raw_extra_variables:
      - CMAKE_C_FLAGS=$CFLAGS
      - CMAKE_CXX_FLAGS=$CXXFLAGS
    raw_environment:
      # Pass through architecture-specific flags
      - CFLAGS="$CFLAGS"
      - CXXFLAGS="$CXXFLAGS"
      - LDFLAGS="$LDFLAGS"
      - PKG_CONFIG_PATH="$BUILD_DIR"/deps/lib/pkgconfig:"$BUILD_DIR"/AppDir/usr/conda/lib/pkgconfig:"$PKG_CONFIG_PATH"
      - PATH="$BUILD_DIR"/deps/bin:"$PATH"
    script:
      - |2
        . AppDir/usr/conda/bin/activate
        echo "PKG_CONFIG_PATH (cmake): $PKG_CONFIG_PATH"

scripts:
  pre_build:
    - pushd "$BUILD_DIR"
    - |2
      # Detect architecture
      if [ -z "$ARCH" ]; then
        ARCH=$(uname -m)
      fi
      echo "Building for architecture: $ARCH"

      # We need the Python environment before the build already, therefore we have to run the conda
      # plugin manually before the build
      wget https://github.com/knarfS/linuxdeploy-plugin-conda/raw/master/linuxdeploy-plugin-conda.sh
      # Skip the built-in cleanup as the build needs the development files (headers, libs, ...)
      export CONDA_SKIP_CLEANUP=1
      export CONDA_SKIP_ADJUST_PATHS=1
      chmod +x linuxdeploy-plugin-conda.sh
      ./linuxdeploy-plugin-conda.sh --appdir AppDir
      . AppDir/usr/conda/bin/activate

      # Setup environment for dependencies
      export PKG_CONFIG_PATH="$BUILD_DIR/deps/lib/pkgconfig:$BUILD_DIR/AppDir/usr/conda/lib/pkgconfig:$PKG_CONFIG_PATH"

      # Add Conda Python headers to CPATH to ensure they are found by dependency builds
      PYTHON_INC=$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))")
      export CPATH="$PYTHON_INC:$BUILD_DIR/deps/include:$CPATH"

      # Use exported CFLAGS/CXXFLAGS/LDFLAGS or default to 32-bit if targeting i386
      if [ "$ARCH" == "i386" ] || [ "$ARCH" == "i686" ]; then
        export CFLAGS="-m32 -I$BUILD_DIR/deps/include $CFLAGS"
        export CXXFLAGS="-m32 -I$BUILD_DIR/deps/include $CXXFLAGS"
        export LDFLAGS="-m32 -L$BUILD_DIR/deps/lib -L$BUILD_DIR/AppDir/usr/conda/lib $LDFLAGS"
        HOST_TRIPLET="--host=i686-linux-gnu"
        SIGROK_LD="LD='ld -m elf_i386'"
      fi
      
      # Build libserialport
      git clone https://github.com/taligentx/sigrok-libserialport
      pushd sigrok-libserialport
      ./autogen.sh
      ./configure --prefix="$BUILD_DIR"/deps $HOST_TRIPLET
      make -j$(nproc)
      make install
      popd

      # Build libgpib
      git clone https://git.code.sf.net/p/linux-gpib/git linux-gpib
      pushd linux-gpib/linux-gpib-user
      ./bootstrap
      ./configure --prefix="$BUILD_DIR"/deps --sysconfdir="$BUILD_DIR"/deps/etc $HOST_TRIPLET --disable-python-binding --disable-perl-binding --disable-php-binding --disable-guile-binding
      make -j$(nproc)
      make install
      popd

      # Build libsigrok
      git clone --branch zeeweii_dso3d12 https://github.com/taligentx/sigrok-libsigrok
      pushd sigrok-libsigrok
      ./autogen.sh
      eval ./configure --prefix="$BUILD_DIR"/deps $HOST_TRIPLET $SIGROK_LD --without-libhidapi
      eval make -j$(nproc) $SIGROK_LD
      make install
      popd

      # Build QWT
      git clone https://github.com/czyt1988/QWT.git
      pushd QWT
      mkdir build
      cd build
      cmake -DCMAKE_INSTALL_PREFIX="$BUILD_DIR"/deps \
            -DCMAKE_C_FLAGS="$CFLAGS" -DCMAKE_CXX_FLAGS="$CXXFLAGS" \
            -DQWT_CONFIG_BUILD_EXAMPLE=OFF -DQWT_CONFIG_BUILD_STATIC_EXAMPLE=OFF \
            -DQWT_CONFIG_BUILD_PLAYGROUND=OFF ../
      make -j$(nproc)
      make install
      popd
    - popd

  post_build:
    - |2
      # Cleanup conda
      export CONDA_SKIP_INSTALL=1
      export CONDA_SKIP_ADJUST_PATHS=0
      ./linuxdeploy-plugin-conda.sh --appdir AppDir
    - |2
      # Generate AppRun.sh script
      cat > "$BUILD_DIR"/AppRun.sh <<\EOF
      #! /bin/bash

      # Set paths for the bundled Conda environment
      export PATH="$APPDIR/usr/conda/bin:$PATH"
      export PYTHONHOME="$APPDIR/usr/conda"
      export LD_LIBRARY_PATH="$APPDIR/usr/conda/lib:$APPDIR/usr/lib:$LD_LIBRARY_PATH"

      # Run SmuView
      exec "$APPDIR"/usr/bin/smuview "$@"
      EOF
    - chmod +x "$BUILD_DIR"/AppRun.sh
    - |2
      # Set VERSION from CMake generated shell script
      source cmake-build/contrib/config_version.sh
      export VERSION=${SV_VERSION_STRING}

appimage:
  linuxdeploy:
    plugins:
      - qt
    extra_args: --custom-apprun "$BUILD_DIR"/AppRun.sh
    raw_environment:
      - LD_LIBRARY_PATH="$LD_LIBRARY_PATH":"$BUILD_DIR"/deps/lib:"$BUILD_DIR"/AppDir/usr/conda/lib:/usr/local/lib
